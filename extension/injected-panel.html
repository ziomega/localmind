<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Dark theme (default) ───────────────────────────────────── */
    :root {
      --bg: #0e0e10;
      --bg-card: #17171a;
      --bg-card-hover: #1e1e23;
      --border: #2a2a30;
      --border-card: #1e1e24;
      --accent: #7c6af7;
      --accent-dim: rgba(124,106,247,0.15);
      --text: #e8e8ed;
      --text-s: #888895;
      --text-m: #555560;
    }

    /* ── Light theme ────────────────────────────────────────────── */
    :root.light {
      --bg: #f5f4f0;
      --bg-card: #ffffff;
      --bg-card-hover: #f0efe9;
      --border: #e0ddd6;
      --border-card: #ebe8e0;
      --accent: #6254e8;
      --accent-dim: rgba(98,84,232,0.1);
      --text: #1a1a22;
      --text-s: #5a5a6a;
      --text-m: #9a9aaa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      font-size: 12px;
      height: 100%;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid var(--border);
      transition: background 0.2s, color 0.2s;
    }

    .panel {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 12px;
      gap: 8px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 14px;
      color: var(--accent);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent-dim);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 6px var(--accent-dim); }
      50% { box-shadow: 0 0 12px var(--accent); }
    }

    .close {
      background: transparent;
      border: none;
      color: var(--text-m);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .close:hover { color: var(--text); }

    .query-label {
      font-size: 10px;
      color: var(--text-m);
      font-family: monospace;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    .query-text {
      color: var(--accent);
      font-size: 11px;
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    .results {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 5px;
      scrollbar-width: none;
    }

    .results::-webkit-scrollbar { display: none; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      display: block;
    }

    .card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border);
      transform: translateX(2px);
    }

    .card-title {
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-domain {
      font-family: monospace;
      font-size: 9px;
      color: var(--text-m);
    }

    .card-score {
      font-family: monospace;
      font-size: 9px;
      color: var(--accent);
      background: var(--accent-dim);
      border-radius: 3px;
      padding: 1px 4px;
    }

    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 6px;
      color: var(--text-m);
      text-align: center;
      padding: 12px;
    }

    .empty-icon { font-size: 24px; opacity: 0.4; }
    .empty-text { font-size: 11px; line-height: 1.5; }

    .loading {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
    }

    .skeleton {
      height: 52px;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    mark {
      background: var(--accent-dim);
      color: var(--accent);
      border-radius: 2px;
      padding: 0 1px;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <div class="logo">
        <div class="dot"></div>
        LocalMind
      </div>
      <button class="close" id="closeBtn">✕</button>
    </div>

    <div class="query-label">Memory results for</div>
    <div class="query-text" id="queryText">…</div>

    <div class="results" id="results">
      <div class="loading">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </div>
  </div>

  <script src="injected-panel.js"></script>
</body>
</html>
